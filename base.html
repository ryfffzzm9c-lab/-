<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏭 采油厂成本管理系统</title>
<style>
/* ========== 全局变量 & 基础 ========== */
:root {
  --bg: #0a1628;
  --sidebar-bg: #0d1f3c;
  --card-bg: #122647;
  --gold: #f0a500;
  --gold-light: #ffc93c;
  --blue: #1a73e8;
  --text: #c8d6e5;
  --text-dim: #6b7d95;
  --border: #1e3050;
  --danger: #e74c3c;
  --success: #27ae60;
  --radius: 12px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ========== 侧边栏 ========== */
.sidebar {
  width: 240px;
  min-height: 100vh;
  background: var(--sidebar-bg);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: fixed;
  top:0; left:0; bottom:0;
  z-index: 100;
  transition: transform var(--transition);
}

.sidebar-header {
  padding: 24px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
}

.sidebar-header .logo {
  width: 40px; height: 40px;
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  color: #1a1a2e;
  flex-shrink: 0;
}

.sidebar-header h2 {
  font-size: 15px;
  color: #fff;
  line-height: 1.3;
}

.sidebar-nav {
  flex: 1;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  border-radius: 8px;
  color: var(--text-dim);
  text-decoration: none;
  font-size: 14px;
  transition: all var(--transition);
  position: relative;
  overflow: hidden;
}

.nav-item:hover {
  background: rgba(240,165,0,0.08);
  color: #fff;
}

.nav-item.active {
  background: linear-gradient(135deg, rgba(240,165,0,0.15), rgba(240,165,0,0.05));
  color: var(--gold);
  font-weight: 600;
}

.nav-item.active::before {
  content: '';
  position: absolute;
  left: 0; top: 50%;
  transform: translateY(-50%);
  width: 3px; height: 24px;
  background: var(--gold);
  border-radius: 0 3px 3px 0;
}

.nav-item .icon {
  font-size: 18px;
  width: 24px;
  text-align: center;
  flex-shrink: 0;
}

.nav-divider {
  height: 1px;
  background: var(--border);
  margin: 8px 12px;
}

.sidebar-footer {
  padding: 16px 20px;
  border-top: 1px solid var(--border);
  font-size: 12px;
  color: var(--text-dim);
}

/* ========== 主内容区 ========== */
.main-content {
  margin-left: 240px;
  flex: 1;
  padding: 28px 32px;
  min-height: 100vh;
}

.page-header {
  margin-bottom: 28px;
}

.page-header h1 {
  font-size: 26px;
  color: #fff;
  font-weight: 700;
  margin-bottom: 4px;
}

.page-header p {
  color: var(--text-dim);
  font-size: 14px;
}

/* ========== 统计卡片 ========== */
.stat-cards {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
  margin-bottom: 28px;
}

.stat-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  position: relative;
  overflow: hidden;
  transition: all var(--transition);
}

.stat-card:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow);
  border-color: rgba(240,165,0,0.3);
}

.stat-card .icon-circle {
  width: 48px; height: 48px;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px;
  margin-bottom: 16px;
}

.stat-card .stat-value {
  font-size: 32px;
  font-weight: 700;
  color: #fff;
  margin-bottom: 4px;
}

.stat-card .stat-label {
  font-size: 13px;
  color: var(--text-dim);
}

.stat-card .stat-badge {
  position: absolute;
  top: 20px; right: 20px;
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 20px;
}

/* 卡片配色 */
.card-gold .icon-circle { background: rgba(240,165,0,0.15); color: var(--gold); }
.card-blue .icon-circle { background: rgba(26,115,232,0.15); color: var(--blue); }
.card-green .icon-circle { background: rgba(39,174,96,0.15); color: var(--success); }
.card-purple .icon-circle { background: rgba(155,89,182,0.15); color: #9b59b6; }
.card-gold { border-top: 3px solid var(--gold); }
.card-blue { border-top: 3px solid var(--blue); }
.card-green { border-top: 3px solid var(--success); }
.card-purple { border-top: 3px solid #9b59b6; }

/* ========== 卡片容器 ========== */
.card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 24px;
}

.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 24px;
  border-bottom: 1px solid var(--border);
}

.card-header h3 {
  font-size: 16px;
  color: #fff;
  display: flex;
  align-items: center;
  gap: 8px;
}

.card-body { padding: 24px; }
.card-body.no-padding { padding: 0; }

/* ========== 表格 ========== */
.table-wrap { overflow-x: auto; }
.table-wrap table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

.table-wrap th {
  background: rgba(0,0,0,0.25);
  color: var(--text-dim);
  font-weight: 600;
  padding: 12px 16px;
  text-align: left;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border-bottom: 2px solid var(--border);
}

.table-wrap td {
  padding: 12px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  color: var(--text);
}

.table-wrap tr:hover td {
  background: rgba(240,165,0,0.03);
}

/* ========== 按钮 ========== */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 18px;
  border-radius: 8px;
  border: none;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition);
  text-decoration: none;
}

.btn-primary {
  background: var(--gold);
  color: #1a1a2e;
}
.btn-primary:hover { background: var(--gold-light); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(240,165,0,0.3); }

.btn-outline {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text);
}
.btn-outline:hover { border-color: var(--gold); color: var(--gold); }

.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover { background: #c0392b; }

.btn-sm { padding: 5px 12px; font-size: 12px; }

.btn-group { display: flex; gap: 8px; }

/* ========== 表单 ========== */
.form-group { margin-bottom: 16px; }
.form-group label {
  display: block;
  color: var(--text-dim);
  font-size: 12px;
  font-weight: 600;
  margin-bottom: 6px;
}
.form-control, .form-select {
  width: 100%;
  padding: 10px 14px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: rgba(0,0,0,0.2);
  color: #fff;
  font-size: 14px;
  transition: border var(--transition);
}
.form-control:focus, .form-select:focus {
  outline: none;
  border-color: var(--gold);
  box-shadow: 0 0 0 2px rgba(240,165,0,0.15);
}
.form-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; }

/* ========== 搜索框 ========== */
.search-box {
  display: flex; gap: 8px;
  margin-bottom: 20px;
}
.search-box input {
  flex: 1;
  padding: 10px 16px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: rgba(0,0,0,0.2);
  color: #fff;
  font-size: 14px;
}
.search-box input:focus { outline: none; border-color: var(--gold); }

/* ========== 提示框 ========== */
.alert {
  padding: 14px 18px;
  border-radius: 8px;
  margin-bottom: 20px;
  font-size: 14px;
  animation: slideDown 0.3s ease;
}
@keyframes slideDown {
  from { opacity:0; transform:translateY(-10px); }
  to { opacity:1; transform:translateY(0); }
}
.alert-success { background: rgba(39,174,96,0.15); border: 1px solid rgba(39,174,96,0.3); color: #2ecc71; }
.alert-danger { background: rgba(231,76,60,0.15); border: 1px solid rgba(231,76,60,0.3); color: #e74c3c; }

/* ========== 图表面板 ========== */
.chart-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-bottom: 24px;
}

.chart-panel {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
}

.chart-panel h4 {
  font-size: 14px; color: #fff; margin-bottom: 16px;
}

.chart-panel canvas { width: 100% !important; max-height: 280px; }

/* ========== 淡入动画 ========== */
.fade-in {
  animation: fadeIn 0.5s ease forwards;
  opacity: 0;
}
.fade-in:nth-child(1) { animation-delay: 0s; }
.fade-in:nth-child(2) { animation-delay: 0.1s; }
.fade-in:nth-child(3) { animation-delay: 0.2s; }
.fade-in:nth-child(4) { animation-delay: 0.3s; }

@keyframes fadeIn {
  from { opacity:0; transform:translateY(20px); }
  to { opacity:1; transform:translateY(0); }
}

/* ========== SVG 装饰 ========== */
.hero-illustration {
  width: 100%;
  max-width: 280px;
  margin: 0 auto;
  display: block;
  opacity: 0.6;
}

/* 金额颜色 */
.money { color: var(--gold); font-weight: 600; }
.badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 500;
}
.badge-yellow { background: rgba(240,165,0,0.15); color: var(--gold); }
.badge-blue { background: rgba(26,115,232,0.15); color: var(--blue); }
.badge-green { background: rgba(39,174,96,0.15); color: #2ecc71; }

/* 响应式 */
@media (max-width: 1024px) {
  .stat-cards { grid-template-columns: repeat(2,1fr); }
  .chart-row { grid-template-columns: 1fr; }
  .form-grid { grid-template-columns: repeat(2,1fr); }
}
@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .main-content { margin-left: 0; padding:20px; }
  .stat-cards { grid-template-columns: 1fr; }
  .menu-toggle { display: block !important; }
}
.menu-toggle {
  display: none;
  position: fixed;
  top: 12px; left: 12px;
  z-index: 200;
  background: var(--card-bg);
  border: 1px solid var(--border);
  color: #fff;
  padding: 8px 12px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 18px;
}

/* ========== 安全动效（不碰 main-content 不碰图表） ========== */

/* Logo 呼吸光 */
.sidebar-header .logo {
  animation: logoGlow 3s ease-in-out infinite;
}
@keyframes logoGlow {
  0%,100%{box-shadow:0 0 0 0 rgba(240,165,0,.3)}
  50%{box-shadow:0 0 16px 4px rgba(240,165,0,.15)}
}

/* 卡片悬浮光 */
.stat-card::before {
  content:'';position:absolute;top:-50%;left:-50%;
  width:200%;height:200%;
  background:radial-gradient(circle, rgba(240,165,0,.04) 0%, transparent 60%);
  opacity:0;transition:opacity .4s;pointer-events:none;
}
.stat-card:hover::before{opacity:1}

/* 按钮按压 */
.btn:active{transform:scale(.96)!important;transition:transform .08s!important}

/* 输入框聚焦抬升 */
.form-control,.form-select{transition:border .2s,box-shadow .2s,transform .15s}
.form-control:focus,.form-select:focus{transform:translateY(-1px)}

/* 表格行滑入 */
.table-wrap tbody tr{animation:rowIn .35s ease backwards}
.table-wrap tbody tr:nth-child(1){animation-delay:.02s}
.table-wrap tbody tr:nth-child(2){animation-delay:.05s}
.table-wrap tbody tr:nth-child(3){animation-delay:.08s}
.table-wrap tbody tr:nth-child(4){animation-delay:.11s}
.table-wrap tbody tr:nth-child(5){animation-delay:.14s}
.table-wrap tbody tr:nth-child(6){animation-delay:.17s}
.table-wrap tbody tr:nth-child(7){animation-delay:.20s}
.table-wrap tbody tr:nth-child(8){animation-delay:.23s}
.table-wrap tbody tr:nth-child(9){animation-delay:.26s}
.table-wrap tbody tr:nth-child(10){animation-delay:.29s}
.table-wrap tbody tr:nth-child(n+11){animation-delay:.32s}
@keyframes rowIn{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}

/* 报表结果弹入 */
.report-result{animation:popIn .45s cubic-bezier(.16,1,.3,1)}
@keyframes popIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}

/* 全局平滑滚动 */
html{scroll-behavior:smooth}

/* ========== 页面过渡遮罩 ========== */
#page-overlay{
  position:fixed;inset:0;background:var(--bg);z-index:9999;
  opacity:0;pointer-events:none;
  transition:opacity .12s ease;
}
#page-overlay.on{opacity:1;pointer-events:all}

/* ========== 页脚 ========== */
.main-footer {
  text-align: center;
  padding: 16px;
  color: var(--text-dim);
  font-size: 12px;
  border-top: 1px solid var(--border);
  margin-top: 40px;
}
</style>
</head>
<body>
<!-- 移动端菜单按钮 -->
<button class="menu-toggle" onclick="document.querySelector('.sidebar').classList.toggle('open')">☰</button>

<!-- 侧边栏 -->
<aside class="sidebar">
  <div class="sidebar-header">
    <div class="logo">⛽</div>
    <h2>采油厂<br>成本管理系统</h2>
  </div>
  <nav class="sidebar-nav">
    <a href="/" class="nav-item {{ 'active' if request.path=='/' }}">
      <span class="icon">📊</span> 仪表盘
    </a>
    <a href="/projects" class="nav-item {{ 'active' if request.path.startswith('/projects') }}">
      <span class="icon">📋</span> 作业项目
    </a>
    <a href="/materials" class="nav-item {{ 'active' if request.path=='/materials' }}">
      <span class="icon">📦</span> 材料明细
    </a>
    <a href="/report" class="nav-item {{ 'active' if request.path=='/report' }}">
      <span class="icon">📈</span> 成本报表
    </a>
    <div class="nav-divider"></div>
    <a href="/projects/add" class="nav-item">
      <span class="icon">➕</span> 新增项目
    </a>
  </nav>
  <div class="sidebar-footer">
    v2.0 · Flask + SQL Server
  </div>
</aside>

<!-- 主内容区 -->
<main class="main-content">
{% block content %}{% endblock %}
<div class="main-footer">© 2024 数据库实践大作业 · 采油厂油水井作业成本管理系统</div>
</main>

<div id="page-overlay"></div>
<script src="https://cdn.bootcdn.net/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script>
/* 页面切换：点击链接→淡出一屏→跳转 */
(function(){
  var ov=document.getElementById('page-overlay');
  if(!ov)return;
  document.addEventListener('click',function(e){
    var a=e.target.closest('a[href]');
    if(!a)return;
    var h=a.getAttribute('href');
    if(!h||h.startsWith('#')||h.startsWith('javascript:'))return;
    if(a.getAttribute('target')==='_blank')return;
    if(a.closest('form')||a.closest('.btn-group'))return;
    if(h===window.location.pathname)return;
    e.preventDefault();
    ov.classList.add('on');
    setTimeout(function(){window.location.href=h;},100);
  });
  window.addEventListener('pageshow',function(){ov.classList.remove('on');});
})();
</script>
{% block scripts %}{% endblock %}
</body>
</html>
